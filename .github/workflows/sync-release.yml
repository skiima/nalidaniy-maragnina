name: Sync update release

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/sync-release.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download current update files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          mirrors=(
            "https://hosting-three-ashy.vercel.app/updates"
            "https://fsb-script-updates.netlify.app/updates"
          )
          download_file() {
            local name="$1"
            for base in "${mirrors[@]}"; do
              if curl -fL --retry 3 --connect-timeout 15 --max-time 120 "$base/$name" -o "release-assets/$name"; then
                return 0
              fi
            done
            echo "Failed to download $name" >&2
            return 1
          }
          for name in latest.ini script.exe install.exe 2.mp3 bind.txt; do
            download_file "$name"
          done

      - name: Read release metadata
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -a '^version=' release-assets/latest.ini | head -n1 | cut -d= -f2- | tr -d '\r')
          if [ -z "$version" ]; then
            echo "latest.ini has no version" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"
          python3 - <<'PY' >> "$GITHUB_ENV"
          import base64
          from pathlib import Path
          notes = ''
          for raw_line in Path('release-assets/latest.ini').read_bytes().splitlines():
              line = raw_line.decode('ascii', errors='ignore')
              if line.startswith('notes_b64='):
                  notes = base64.b64decode(line.split('=', 1)[1]).decode('utf-8', errors='replace')
                  break
          print('NOTES<<EOF')
          print(notes or 'Update release')
          print('EOF')
          PY

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import mimetypes
          import os
          import pathlib
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          tag = os.environ['TAG']
          notes = os.environ.get('NOTES', 'Update release')
          api = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'release-sync-workflow',
          }

          def request(method, url, body=None, extra_headers=None):
              data = None
              req_headers = dict(headers)
              if extra_headers:
                  req_headers.update(extra_headers)
              if body is not None:
                  if isinstance(body, (dict, list)):
                      data = json.dumps(body).encode('utf-8')
                      req_headers['Content-Type'] = 'application/json; charset=utf-8'
                  else:
                      data = body
              req = urllib.request.Request(url, data=data, method=method, headers=req_headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = response.read()
                      if not payload:
                          return None
                      return json.loads(payload.decode('utf-8'))
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return {'_missing': True}
                  detail = error.read().decode('utf-8', errors='replace')
                  raise RuntimeError(f'{method} {url} failed: {error.code} {detail}') from error

          release = request('GET', f'{api}/releases/tags/{urllib.parse.quote(tag)}')
          release_body = {
              'tag_name': tag,
              'name': tag,
              'body': notes,
              'draft': False,
              'prerelease': False,
              'make_latest': 'true',
          }
          if release and release.get('_missing'):
              release = request('POST', f'{api}/releases', release_body)
          else:
              release = request('PATCH', f"{api}/releases/{release['id']}", release_body)

          wanted = ['latest.ini', 'script.exe', 'install.exe', '2.mp3', 'bind.txt']
          assets = request('GET', f"{api}/releases/{release['id']}/assets?per_page=100") or []
          for asset in assets:
              if asset.get('name') in wanted:
                  request('DELETE', f"{api}/releases/assets/{asset['id']}")

          upload_base = release['upload_url'].split('{', 1)[0]
          content_types = {
              'latest.ini': 'text/plain; charset=windows-1251',
              'script.exe': 'application/vnd.microsoft.portable-executable',
              'install.exe': 'application/vnd.microsoft.portable-executable',
              '2.mp3': 'audio/mpeg',
              'bind.txt': 'text/plain; charset=utf-8',
          }
          for name in wanted:
              path = pathlib.Path('release-assets') / name
              body = path.read_bytes()
              upload_url = f'{upload_base}?name={urllib.parse.quote(name)}'
              request('POST', upload_url, body, {'Content-Type': content_types.get(name, 'application/octet-stream')})
              print(f'Uploaded {name}')

          print(f'Published release {tag}')
          PY
